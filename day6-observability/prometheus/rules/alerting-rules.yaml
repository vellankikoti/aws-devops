groups:
  - name: sockshop-alerts
    rules:
      - alert: HighCPUUsage
        expr: sum(rate(container_cpu_usage_seconds_total{namespace="sock-shop"}[5m])) by (pod) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.pod }}"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total{namespace="sock-shop"}[15m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.pod }} is crash looping"

      - alert: HighMemoryUsage
        expr: container_memory_usage_bytes{namespace="sock-shop"} / container_spec_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 90% on {{ $labels.pod }}"

      - alert: High5xxRate
        expr: sum(rate(http_requests_total{status=~"5..",namespace="sock-shop"}[5m])) / sum(rate(http_requests_total{namespace="sock-shop"}[5m])) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "5xx error rate above 5%"

      - alert: HighLatency
        expr: histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{namespace="sock-shop"}[5m])) by (le)) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "99th percentile latency above 2s"
