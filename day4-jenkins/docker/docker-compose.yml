version: '3.8'
services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc
    restart: unless-stopped

volumes:
  jenkins_home:
    driver: local
