# Metrics Server is required for HPA
# Install via:
# kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# Or use this manifest for custom configuration:
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-server
  namespace: kube-system
---
# For EKS, metrics-server is often pre-installed.
# Verify with: kubectl get deployment metrics-server -n kube-system
# If not installed, run the kubectl apply command above.
